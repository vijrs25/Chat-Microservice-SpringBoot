<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Chat Dashboard</title>
    <link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <div class="current-user">
                    <p><strong><span id="username">User Name </span></strong></p>
                    <p id="email">user@email.com</p>
                    <p id="phone">contact</p>
                </div>
            </div>

            <div class="sidebar-search">
                <input type="text" placeholder="Search or start new chat">
            </div>

            <ul class="contact-list" id="contactlist">
                <li class="contact-item active"></li>
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <div>
                    <h3>Rahul</h3>
                    <p>online</p>
                </div>

                <form action="logout" method="get">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </div>

            <div class="chat-messages"></div>   
            <form class="chat-composer" class="chat-form">
                <input type="text" name="message" class="chat-input" placeholder="Type a message">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </main>

    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="./js/loadUser.js"></script>
</html>
</html>
